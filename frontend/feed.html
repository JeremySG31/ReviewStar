<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed - ReviewStar</title>
  <link rel="stylesheet" href="./css/animations.css">

  <!-- Estilos responsive para móviles -->
  <link href="./css/output.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .brand {
      background: linear-gradient(to right, #3b82f6, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      font-weight: 700;
      /* Mejorar visibilidad del logo */
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-700 dark:from-gray-900 dark:via-slate-800 dark:to-black min-h-screen text-white font-[Poppins] selection:bg-blue-500/50">

  <!-- Navbar -->
  <nav class="bg-black/30 backdrop-blur-sm border-b border-white/10 sticky top-0 z-40">
    <div class="container mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="text-2xl brand">ReviewStar ⭐</a>
      <div id="userArea" class="flex items-center gap-6">
        <a href="index.html" class="hover:text-cyan-400 transition">Inicio</a>
        <a href="feed.html" class="text-cyan-400 font-semibold">Explorar Feed</a>
        <a href="profile.html" id="userNameLink" class="hover:text-cyan-400 transition">Mi Perfil</a>
        <button id="btnCerrarSesion" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition">
          Cerrar sesión
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="container mx-auto px-6 py-12">
    <!-- Filtros y Búsqueda -->
    <div id="filterContainer" class="flex flex-col md:flex-row justify-center gap-4 mb-8">
      <!-- Buscador -->
      <div class="relative w-full md:w-1/3">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
        <input type="text" id="filterSearch" placeholder="Buscar por título o contenido..." 
          class="w-full bg-gray-800 border border-gray-600 rounded-lg pl-10 pr-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow-sm transition">
      </div>
      
      <select id="filterCategory"
        class="w-full md:w-auto bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow-sm">
        <option value="">Todas las categorías</option>
        <option value="Películas">🎬 Películas</option>
        <option value="Series">📺 Series</option>
        <option value="Videojuegos">🎮 Videojuegos</option>
        <option value="Libros">📚 Libros</option>
        <option value="Tecnología">💻 Tecnología</option>
        <option value="Otro">🔖 Otro</option>
      </select>
      <select id="filterSort"
        class="w-full md:w-auto bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow-sm">
        <option value="recent">Más recientes</option>
        <option value="likes">Más populares</option>
        <option value="comments">Más comentadas</option>
        <option value="rating">Mejor valoradas</option>
      </select>
    </div>

    <!-- Feed de reseñas -->
    <div id="feedContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Las reseñas se cargarán aquí dinámicamente -->
    </div>

    <!-- Loading -->
    <div id="loadingFeed" class="text-center py-12 hidden">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-400"></div>
      <p class="mt-4 text-gray-400">Cargando reseñas...</p>
    </div>

    <!-- Empty State -->
    <div id="emptyFeed" class="text-center py-12 hidden">
      <p class="text-2xl text-gray-400">📭 No hay reseñas disponibles</p>
    </div>
  </section>

  <!-- Modal de Comentarios -->
  <div id="modalComentarios"
    class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-2xl p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-bold">💬 Comentarios</h3>
        <button id="btnCerrarModal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
      </div>

      <!-- Formulario de comentario -->
      <div id="formComentario" class="mb-6">
        <textarea id="inputComentario"
          class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-cyan-500"
          rows="3" placeholder="Escribe tu comentario..."></textarea>
        <button id="btnEnviarComentario" class="mt-2 px-6 py-2 rounded-lg font-semibold transition bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-500 hover:from-cyan-400 hover:via-blue-400 hover:to-purple-400 text-white shadow-lg">
          ✨ Enviar comentario
        </button>
      </div>

      <!-- Lista de comentarios -->
      <div id="listaComentarios" class="space-y-4">
        <!-- Los comentarios se cargarán aquí -->
      </div>
    </div>
  </div>

  <!-- Modal Editar Comentario -->
  <div id="modalEditarComentario" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4" style="z-index: 99999 !important;">
    <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-md border border-gray-700 shadow-2xl" style="z-index: 100000;">
      <h3 class="text-lg font-bold mb-4 text-white flex items-center gap-2">
        <span class="text-2xl">✏️</span> Editar comentario
      </h3>
      <textarea id="inputEditarComentario" rows="4" 
        class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 text-white mb-4"></textarea>
      <div class="flex justify-end gap-3">
        <button id="btnCancelarEditar" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg transition text-sm">
          Cancelar
        </button>
        <button id="btnConfirmarEditar" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-lg transition text-sm font-semibold">
          Guardar cambios
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Eliminar Comentario -->
  <div id="modalEliminarComentario" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4" style="z-index: 99999 !important;">
    <div class="bg-gray-800 rounded-2xl p-6 w-full max-w-sm border border-red-900/50 shadow-2xl" style="z-index: 100000;">
      <div class="text-center">
        <div class="text-4xl mb-3">🗑️</div>
        <h3 class="text-lg font-bold mb-2 text-white">¿Eliminar comentario?</h3>
        <p class="text-sm text-gray-400 mb-4">Esta acción no se puede deshacer.</p>
      </div>
      <div class="flex justify-center gap-3">
        <button id="btnCancelarEliminar" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-lg transition text-sm">
          Cancelar
        </button>
        <button id="btnConfirmarEliminar" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg transition text-sm font-semibold">
          Eliminar
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/feed.js"></script>
</body>

</html>
