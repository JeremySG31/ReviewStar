<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de usuario - ReviewStar</title>
  <link href="./css/output.css" rel="stylesheet">
  <link href="./css/animations.css" rel="stylesheet">
  <link href="./css/responsive.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    .brand {
      background: linear-gradient(to right, #3b82f6, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      font-weight: 700;
    }

    /* Animaciones para el botón Nueva Reseña */
    #fabNuevaReseña {
      transition: all 0.3s ease;
    }

    #fabNuevaReseña:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
    }

    #fabNuevaReseña svg {
      transition: transform 0.3s ease;
    }

    #fabNuevaReseña:hover svg {
      transform: rotate(90deg);
    }

    /* Animación de pulso sutil */
    @keyframes pulse-subtle {

      0%,
      100% {
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }

      50% {
        box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3), 0 4px 6px -2px rgba(139, 92, 246, 0.2);
      }
    }

    #fabNuevaReseña {
      animation: pulse-subtle 3s ease-in-out infinite;
    }

    /* FIXES DE ESTRUCTURA PARA EL PERFIL (Garantiza que funcione sin recompilar Tailwind) */
    .profile-avatar-container {
      width: 100px !important;
      height: 100px !important;
      border-radius: 50% !important;
      border: none !important; /* Remove physical border to stop bleeding */
      background-color: #000000 !important; /* True black to hide aliasing */
      box-shadow: 0 0 0 4px #111827, 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important; /* Use shadow-based border */
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      position: relative !important;
      overflow: hidden !important;
      flex-shrink: 0 !important;
      z-index: 10 !important;
      transform: translateZ(0); 
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    }

    .profile-avatar-img {
      position: absolute !important;
      top: -1% !important; /* Slight over-bleed to cover edges */
      left: -1% !important;
      width: 102% !important; /* Force overflow of 2% to ensure no gaps */
      height: 102% !important;
      object-fit: cover !important;
      z-index: 10;
      border-radius: 50% !important;
      background-color: #000000 !important;
    }

    .profile-info-pull {
      margin-top: -50px !important; /* Forces overlap with banner */
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
    }

    .profile-avatar-img {
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 10;
    }

    .profile-banner {
      height: 120px !important;
      background: linear-gradient(to right, #1d4ed8, #4f46e5, #7e22ce) !important;
      position: relative !important;
      width: 100% !important;
      border-top-left-radius: 0.75rem !important;
      border-top-right-radius: 0.75rem !important;
    }

    .profile-stats-card {
      background-color: rgba(31, 41, 55, 0.8) !important;
      border: 1px solid rgba(55, 65, 81, 0.5) !important;
      backdrop-filter: blur(12px) !important;
      padding: 1rem 2rem !important;
      border-radius: 1rem !important;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3) !important;
      text-align: center !important;
      min-width: 160px !important;
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-indigo-900 via-blue-800 to-sky-700 dark:from-gray-900 dark:via-slate-800 dark:to-black min-h-screen text-white font-[Poppins] selection:bg-blue-500/50">

  <!-- Navbar -->
  <nav class="flex justify-between items-center px-6 py-4 bg-black/30 backdrop-blur-sm border-b border-white/10">
    <a href="./index.html" class="text-2xl brand">ReviewStar ⭐</a>
    <div id="userArea" class="flex items-center gap-4">
      <a href="./feed.html" class="font-semibold text-cyan-400 hover:text-cyan-300 transition">🌟 Explorar Feed</a>
      <button id="logoutBtn"
        class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-md font-semibold transition text-sm">Cerrar
        sesión</button>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <!-- Sección de Perfil y Cabecera -->
    <header class="bg-black/30 backdrop-blur-sm rounded-xl shadow-lg overflow-hidden mb-8 border border-white/5">
      <!-- Imagen de portada -->
      <div class="profile-banner">
        <div class="absolute inset-0 bg-black/20"></div>
      </div>

      <div class="p-6">
        <div class="profile-info-pull">
          <!-- Avatar del usuario -->
          <div class="relative group" style="width: 100px; height: 100px; border-radius: 50%;">
            <div id="avatarContainer" class="profile-avatar-container">
              <span id="profileAvatarText" class="text-gray-400">👤</span>
              <img id="profileAvatarImg" src="" alt="Avatar" class="hidden profile-avatar-img">
              <!-- Overlay de carga -->
              <div id="avatarLoading" class="absolute inset-0 bg-black/70" style="display: none; align-items: center; justify-content: center; z-index: 30;">
                 <div class="animate-spin" style="width: 24px; height: 24px; border-radius: 50%; border-bottom: 2px solid #22d3ee;"></div>
              </div>
            </div>
            
            <!-- INPUT INVISIBLE (Ocupa todo el círculo para el clic) -->
            <input type="file" id="avatarInput" accept="image/*" 
              style="position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 40; font-size: 0;" 
              title="Cambiar avatar">

            <!-- Overlay visual (Solo en HOVER) -->
            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center z-30 pointer-events-none shadow-inner" style="border-radius: 50%;">
                 <span class="text-[10px] uppercase font-bold text-white">📷 Cambiar</span>
            </div>

            <!-- Botón de ELIMINAR (Más pequeño y más abajo a la DERECHA) -->
            <button id="deleteAvatarBtn" 
              class="absolute bg-red-600 hover:bg-red-700 text-white rounded-full flex items-center justify-center shadow-lg transition-all hover:scale-110 active:scale-95 z-50 hidden border border-slate-900" 
              style="width: 22px !important; height: 22px !important; min-width: 22px !important; left: 108px; top: 60px;"
              title="Quitar foto de perfil">
              <span style="font-size: 11px;">🗑️</span>
            </button>
          </div>
          
          <!-- Info de Usuario -->
          <div class="mt-4 text-center">
            <h1 id="profileName" class="text-4xl md:text-5xl font-extrabold" style="background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent;">Cargando...</h1>
            <p id="profileEmail" class="text-cyan-200 mt-1 font-medium bg-black/30 inline-block px-4 py-1 rounded-full text-sm">cargando@email.com</p>
            
            <!-- Estadísticas -->
            <div class="flex flex-wrap justify-center gap-4 mt-8">
              <div class="profile-stats-card hover:shadow-cyan-500/20 transition">
                <p class="text-3xl font-extrabold text-white" id="totalReviewsCount">0</p>
                <p class="text-xs text-cyan-400 uppercase tracking-widest font-semibold mt-1">Reseñas</p>
              </div>
              <div class="profile-stats-card hover:shadow-pink-500/20 transition">
                <p class="text-3xl font-extrabold text-white" id="totalLikesCount">0</p>
                <p class="text-xs text-pink-400 uppercase tracking-widest font-semibold mt-1">Likes Recibidos</p>
              </div>
            </div>
            
          </div>
        </div>
      </div>
    </header>

    <!-- Sección de Reseñas del Usuario -->
    <section class="py-16 px-6 bg-black/20 backdrop-blur-sm rounded-xl">
      <div class="max-w-6xl mx-auto">
        <h2 class="text-3xl font-bold mb-8 text-center">Mis Reseñas</h2>

        <!-- Barra de acciones: Botón Nueva Reseña + Filtro -->
        <div class="flex justify-end items-center gap-3 mb-6">
          <button id="fabNuevaReseña"
            class="px-3 py-1.5 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded font-semibold shadow-lg flex items-center gap-1.5 text-xs">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Nueva Reseña
          </button>

          <div class="relative group w-64">
            <select id="categoryFilter"
              class="appearance-none w-full px-5 py-3 rounded-xl bg-gray-900/60 backdrop-blur-md border border-gray-700 text-gray-200 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all cursor-pointer hover:bg-gray-800 hover:border-gray-600 shadow-lg">
              <option value="all" class="bg-gray-900">✨ Todas las categorías</option>
              <option value="Películas" class="bg-gray-900">🎬 Películas</option>
              <option value="Series" class="bg-gray-900">📺 Series</option>
              <option value="Videojuegos" class="bg-gray-900">🎮 Videojuegos</option>
              <option value="Libros" class="bg-gray-900">📚 Libros</option>
              <option value="Tecnología" class="bg-gray-900">💻 Tecnología</option>
              <option value="Otro" class="bg-gray-900">🔮 Otro</option>
            </select>
            <div
              class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-gray-400 group-hover:text-blue-400 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>

        <div id="misReseñas" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
          <!-- Las tarjetas de reseña se insertarán aquí dinámicamente -->
        </div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modalReseña" style="z-index: 110;"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center">
    <div class="bg-gray-900/80 border border-white/10 rounded-xl p-6 w-full max-w-lg relative">
      <h3 id="modalTitulo" class="text-xl font-semibold mb-4">Nueva reseña</h3>
      <form id="reseñaForm" class="space-y-4">
        <div>
          <label class="block mb-1">Título</label>
          <input id="titulo" type="text" required
            class="w-full p-2.5 rounded-md bg-gray-800/40 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
        </div>
        <div>
          <label class="block mb-1">Descripción</label>
          <textarea id="contenido" rows="4" required
            class="w-full p-2.5 rounded-md bg-gray-800/40 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500 transition"></textarea>
        </div>
        <div>
          <label for="category" class="block mb-1">Categoría</label>
          <select id="category" required
            class="w-full p-2.5 rounded-md bg-gray-800/40 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-green-500 transition">
            <option value="" class="bg-gray-800 text-white">-- Elige una categoría --</option>
            <option value="Películas" class="bg-gray-800 text-white">Películas</option>
            <option value="Series" class="bg-gray-800 text-white">Series</option>
            <option value="Videojuegos" class="bg-gray-800 text-white">Videojuegos</option>
            <option value="Libros" class="bg-gray-800 text-white">Libros</option>
            <option value="Tecnología" class="bg-gray-800 text-white">Tecnología</option>
            <option value="Otro" class="bg-gray-800 text-white">Otro</option>
          </select>
        </div>
        <div>
          <label for="reviewImage" class="block mb-1">Subir imagen (opcional)</label>
          <label id="fileUploadLabel" for="reviewImage"
            class="inline-block cursor-pointer px-4 py-2 border border-gray-600 bg-gray-800/40 text-gray-300 hover:bg-gray-700 rounded-md font-semibold transition text-sm truncate max-w-full">
            Elegir archivo
          </label>
          <!-- El input real está oculto, la label actúa como el botón -->
          <input id="reviewImage" type="file" accept="image/*" class="hidden">
        </div>
        <div>
          <label class="block mb-1">Calificación</label>
          <div id="ratingStars" class="flex text-3xl cursor-pointer text-gray-500">
            <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star"
              data-value="3">★</span><span class="star" data-value="4">★</span><span class="star"
              data-value="5">★</span>
          </div>
          <span id="ratingValueDisplay" class="text-sm text-gray-400 mt-1 block">0.0 / 5.0</span>
          <input id="ratingInput" type="hidden" value="0">
        </div>
        <div class="flex justify-end gap-4 pt-2">
          <button type="button" id="cancelarBtn"
            class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md font-semibold transition">Cancelar</button>
          <button id="submitReviewBtn" type="submit"
            class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-md font-semibold transition">Guardar</button>
        </div>
      </form>
    </div>
  </div>


  <!-- Modal de Confirmación de Eliminación -->
  <div id="modalConfirmarEliminar" style="z-index: 130;"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center">
    <div class="bg-gray-900 border border-gray-700 rounded-lg p-4 shadow-xl" style="width: 280px;">
      <!-- Título -->
      <h3 class="text-sm font-semibold text-white mb-1">¿Eliminar reseña?</h3>
      <p id="eliminarReseñaTitulo" class="text-xs text-red-400 truncate mb-2">"Título"</p>
      <p class="text-xs text-gray-500 mb-3">⚠️ No se puede deshacer</p>
      
      <!-- Botones -->
      <div class="flex gap-2 justify-end">
        <button id="cancelarEliminarBtn"
          class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs transition">
          Cancelar
        </button>
        <button id="confirmarEliminarBtn"
          class="px-3 py-1 bg-red-600 hover:bg-red-500 rounded text-xs transition">
          Eliminar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal de Comentarios -->
  <div id="modalComentarios" style="z-index: 120;"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center">
    <div
      class="modal-show bg-gray-900/90 border border-white/10 rounded-xl p-6 w-full max-w-3xl max-h-[90vh] overflow-y-auto relative">
      <button id="cerrarComentariosBtn"
        class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl transition">&times;</button>
      <h3 class="text-2xl font-bold mb-6">💬 Comentarios</h3>
      <div id="comentariosReviewContent" class="bg-gray-800/50 rounded-xl p-4 mb-6 border border-gray-700"></div>
      <form id="nuevoComentarioForm" class="mb-6">
        <label class="block mb-2 font-semibold">✍️ Agregar comentario</label>
        <textarea id="nuevoComentarioTexto" rows="3" required
          class="w-full p-3 rounded-md bg-gray-800/40 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
          placeholder="Escribe tu comentario aquí..."></textarea>
        <button type="submit"
          class="mt-3 px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 rounded-md font-semibold transition">Publicar
          Comentario</button>
      </form>
      <div id="listaComentarios" class="space-y-4">
        <h4 class="font-semibold text-lg mb-3">Todos los comentarios</h4>
      </div>
    </div>
  </div>


  <!-- Scripts -->
  <script type="module" src="./js/main.js"></script>
</body>

</html>
